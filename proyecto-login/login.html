<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <title>login sportclub</title>
  </head>
  <body>
    <header>
      <a href="landing.html" aria-label="Volver al inicio">
        <img
          class="logo"
          src="assets/logo_empresa_letra_v1.png"
          alt="Logo de SportClub"
        />
      </a>
    </header>
    <main>
      <h2>Login</h2>
      <form id="form-login">
        <label for="email">Email:</label>
        <input
          id="email"
          name="email"
          type="email"
          placeholder="Ingresa tu correo"
          required
        />
        <label for="password">contraseña:</label>
        <input
          id="password"
          name="password"
          type="password"
          placeholder="Ingresa tu contraseña"
          required
        />
        <button type="submit">Ingresar</button>
        <div id="login-message" class="form-message" aria-live="polite"></div>
      </form>
      <hr />
      <div class="auth-links auth-links--login">
        <a href="recover.html">¿Olvidaste tu contraseña?</a>
        <a href="register.html">Registrarse</a>
      </div>
    </main>
    <script type="module" src="js/pages/login.js"></script>
  </body>
</html>
