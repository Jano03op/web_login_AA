<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <script type="module" src="js/pages/register.js"></script>
    <title>Registrarse</title>
  </head>
  <body>
    <header>
      <a href="landing.html" aria-label="Volver al inicio">
        <img
          class="logo"
          src="assets/logo_empresa_letra_v1.png"
          alt="Logo de SportClub"
        />
      </a>
    </header>
    <main>
      <h2>Registrarse</h2>
      <form id="form-register" action="login.html" method="get" novalidate>
        <label for="full_name">Nombre:</label>
        <input
          type="text"
          id="full_name"
          name="full_name"
          placeholder="Ingresa tu nombre"
          required
        />
        <label for="email">Email:</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="Ingresa tu correo"
          required
        />
        <label for="password">Contraseña:</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Ingresa tu contraseña"
          required
        />
        <label for="confirm_password">Confirmar contraseña:</label>
        <input
          type="password"
          id="confirm_password"
          name="confirm_password"
          placeholder="Repite tu contraseña"
          required
        />
        <label for="edad">Edad:</label>
        <input
          type="number"
          id="edad"
          name="edad"
          placeholder="Ingresa tu edad"
          required
        />
        <label for="practicaDeporte">¿Practicas deporte?</label>
        <select id="practicaDeporte">
          <option value="si">Sí, regularmente</option>
          <option value="no">No actualmente</option>
          <option value="ocasional">Ocasionalmente</option>
        </select>
        <label for="tipoDePorte">Tipo de deporte</label>
        <select id="tipoDePorte">
          <option value="">Selecciona el Tipo</option>
          <option value="atletismo">Atletismo</option>
          <option value="natacion">Natación</option>
          <option value="ciclismo">Ciclismo</option>
          <option value="futbol">fútbol</option>
          <option value="fitness">Fitness/pesas</option>
          <option value="otros">Otros</option>
        </select>
        <label for="objPersonal">Objetivo Personal</label>
        <input
          type="text"
          id="objPersonal"
          name="objPersonal"
          placeholder="Ej: Ganar masa muscular, mejorar resistencia..."
        />
        <div class="form-group">
          <label>Nivel de experiencia</label>
          <div class="radio-group">
            <label class="radio-item">
              <input name="level" type="radio" value="principiante" />
              <span>Principiante</span>
            </label>
            <label class="radio-item">
              <input name="level" type="radio" value="intermedio" />
              <span>Intermedio</span>
            </label>
            <label class="radio-item">
              <input name="level" type="radio" value="avanzado" />
              <span>Avanzado</span>
            </label>
          </div>
        </div>
        <button type="submit">Registrarse</button>
        <div id="register-message" class="form-message" aria-live="polite"></div>
      </form>
      <div class="auth-links">
        <span>¿Ya eres miembro?</span>
        <a href="login.html">Inicia sesion aquí</a>
      </div>
    </main>
  </body>
</html>
